version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A backend.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
